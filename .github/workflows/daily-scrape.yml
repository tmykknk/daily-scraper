name: daily-scrape

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 UTC 0:00 = JST 9:00
  workflow_dispatch: {}   # 手動実行用ボタンも有効化

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false
          python-version: "3.13"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked

      - name: Install Chrome for Playwright
        run: uv run playwright install --with-deps chrome

      - name: Restore Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS_JSON" ]; then
            echo "$GOOGLE_CREDENTIALS_JSON" | base64 -d > credentials.json
          fi
          if [ -n "$GOOGLE_OAUTH_TOKEN_JSON" ]; then
            printf '%s' "$GOOGLE_OAUTH_TOKEN_JSON" > token.json
          fi

      - name: Run scraper
        env:
          GOOGLE_AUTH_MODE: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON != '' && 'oauth' || 'service_account' }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          SCRAPER_BROWSER_CHANNEL: chrome
          SCRAPER_HEADLESS: "true"
        run: uv run python scrape.py

      - name: Cleanup
        if: always()
        run: rm -f credentials.json token.json
